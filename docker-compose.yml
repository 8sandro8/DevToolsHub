version: '3.8'

services:
  devtools-hub:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: devtools-hub-nas
    working_dir: /app/backend
    command: npm start
    ports:
      - "4004:4004"  # NAS:4004 -> Contenedor:4004
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4004
      - DB_PATH=/data/devtools.db
      - UPLOADS_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET:-production_synology_nas_change_me}
      - JWT_EXPIRES_IN=24h
      - CORS_ORIGIN=http://192.168.1.77:4004
    volumes:
      - ./backend:/app/backend:ro
      - /app/backend/node_modules  # VOLUMEN ANÓNIMO: protege los binarios de Linux
      - ./frontend:/app/frontend:ro
      - ./database:/app/database:ro
      - /volume1/docker/Proyectos/DevToolsHub/Dev_Tools_Hub/data:/data:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
