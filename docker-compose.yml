services:
  devtoolshub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devtoolshub
    working_dir: /app/backend
    env_file:
      - .env
    command: npm run dev
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=4002
      - DB_PATH=/data/devtools.db
      - UPLOADS_DIR=/data/uploads
      - CORS_ORIGIN=*
    volumes:
      - ./:/app
      - devtoolshub_node_modules:/app/backend/node_modules
      - ./data:/data
    restart: unless-stopped

volumes:
  devtoolshub_node_modules:
